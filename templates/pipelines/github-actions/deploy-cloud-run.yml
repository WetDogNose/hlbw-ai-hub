name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: <PROJECT_ID> # TODO: Set this to your Google Cloud project ID
  REGION: us-central1
  SERVICE_NAME: <SERVICE_NAME> # TODO: Set this to your desired Cloud Run service name

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Required for Workload Identity Federation OIDC token
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github-pool/providers/github-provider' # TODO: Replace with your WIF provider path
        service_account: 'my-service-account@${{ env.PROJECT_ID }}.iam.gserviceaccount.com' # TODO: Replace with your deployment service account

    - name: Configure Docker to use Artifact Registry
      run: |-
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/repo-name/${{ env.SERVICE_NAME }}:${{ github.sha }} # TODO: Configure artifact repository name

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/repo-name/${{ env.SERVICE_NAME }}:${{ github.sha }}
        flags: '--allow-unauthenticated' # Remove this flag if service should be private
