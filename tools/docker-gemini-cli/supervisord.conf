[supervisord]
nodaemon=true
user=root

[program:sshd]
command=/usr/sbin/sshd -D
priority=1
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fastapi]
command=python3 /home/gemini_user/src/server.py
user=gemini_user
directory=/home/gemini_user
priority=2
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
