<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Real-time Memory Fragment Monitor</title>
    <!-- vis.js for network graph -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" rel="stylesheet" type="text/css" />
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .graph-pane {
            flex: 1;
            position: relative;
            background-color: #020617;
            border-right: 1px solid #334155;
        }

        #network {
            width: 100%;
            height: 100%;
        }

        .feed-pane {
            width: 450px;
            display: flex;
            flex-direction: column;
            background-color: #0f172a;
        }

        .feed-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
            background-color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #38bdf8;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ef4444; /* red by default */
            margin-right: 6px;
        }

        .status-dot.connected {
            background-color: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        #log-feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1e293b;
        }

        .log-time {
            color: #64748b;
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .log-action {
            font-weight: bold;
            color: #e2e8f0;
        }

        .log-entity {
            color: #38bdf8;
        }

        .log-meta {
            color: #94a3b8;
            margin-top: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Tooltip style */
        .info-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(30, 41, 59, 0.9);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            backdrop-filter: blur(4px);
            max-width: 300px;
            pointer-events: none;
            z-index: 10;
        }

        .info-panel div {
            margin-bottom: 4px;
        }

        .refresh-btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .refresh-btn:hover { background: #0369a1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="graph-pane">
            <div class="info-panel">
                <div style="font-weight: bold; color: #38bdf8; margin-bottom: 8px;">Swarm Memory Graph</div>
                <div style="font-size: 0.8rem; color: #cbd5e1;">Nodes represent entities, workers, and tasks mapped in Neo4j.</div>
            </div>
            <div id="network"></div>
        </div>
        <div class="feed-pane">
            <div class="feed-header">
                <h2>Real-time Audit Feed</h2>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <button class="refresh-btn" id="refresh-graph-btn">Refresh Graph</button>
                    <div class="status-indicator">
                        <div class="status-dot" id="ws-status"></div>
                        <span id="ws-status-text">Disconnected</span>
                    </div>
                </div>
            </div>
            <div id="log-feed">
                <!-- Log entries will appear here -->
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
