steps:
  # Pull the previous image (if available) to speed up the build using Docker cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/wot-box:latest || exit 0'

  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/wot-box:latest',
      '-t', 'gcr.io/$PROJECT_ID/wot-box:$BUILD_ID',
      '--cache-from', 'gcr.io/$PROJECT_ID/wot-box:latest',
      '--build-arg', 'NEXT_PUBLIC_ADSENSE_PUB_ID=ca-pub-1756839464398511',
      '.'
    ]

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wot-box:latest']

  # Push the specific commit image as well
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wot-box:$BUILD_ID']

  # Enforce DB security settings (SSL, Password Policy, Backups, Deletion Protection)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'sql'
      - 'instances'
      - 'patch'
      - 'wot-box-db-instance'
      - '--require-ssl'
      - '--enable-password-policy'
      - '--backup-start-time=03:00'
      - '--deletion-protection'

  # Execute DB Schema Migration using the newly built container
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs update wot-box-db-migrate \
          --image gcr.io/$PROJECT_ID/wot-box:$BUILD_ID \
          --command node \
          --args="scripts/migrate-db.js" \
          --region asia-southeast1 || exit 1
        gcloud run jobs execute wot-box-db-migrate --region asia-southeast1 --wait || exit 1

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'wot-box'
      - '--image'
      - 'gcr.io/$PROJECT_ID/wot-box:$BUILD_ID'
      - '--region'
      - 'asia-southeast1'
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'
      - '--port'
      - '3000'
      - '--max-instances'
      - '24'
      - '--memory'
      - '1024Mi'
      - '--add-cloudsql-instances'
      - 'wot-box:asia-southeast1:wot-box-db-instance'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_APP_URL=https://wot-box.com,NEXTAUTH_URL=https://wot-box.com,GCS_BUCKET_NAME=wot-box-uploads,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,SMTP_SECURE=false,ADMIN_EMAIL=barneswo@gmail.com,NEXT_PUBLIC_ADSENSE_PUB_ID=ca-pub-1756839464398511,APP_VERSION=$SHORT_SHA,APPLE_CLIENT_ID=com.wot-box.si,APPLE_TEAM_ID=A76BV63763,APPLE_KEY_ID=AQ5WAKV29R'
      - '--set-secrets'
      - 'DATABASE_URL=database-url:latest,NEXTAUTH_SECRET=nextauth-secret:latest,GEMINI_API_KEY=gemini-api-key:latest,SMTP_PASSWORD=smtp-password:latest,SMTP_USER=smtp-user:latest,GOOGLE_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,GITHUB_CLIENT_ID=github-oauth-client-id:latest,GITHUB_CLIENT_SECRET=github-oauth-client-secret:latest,AZURE_AD_CLIENT_ID=azure-ad-oauth-client-id:latest,AZURE_AD_CLIENT_SECRET=azure-ad-oauth-client-secret:latest,APPLE_PRIVATE_KEY=apple-private-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_PUBLISHABLE_KEY=stripe-publishable-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest'

images:
  - 'gcr.io/$PROJECT_ID/wot-box:latest'
  - 'gcr.io/$PROJECT_ID/wot-box:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
