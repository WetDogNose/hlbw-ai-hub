# 🤖 AGENT DIRECTIVE: ALL CLOUD RUN AND INFRASTRUCTURE DEPLOYMENTS MUST TARGET THE `asia-southeast1` REGION. 
# NEVER DEPLOY TO `us-central1` OR ANY OTHER REGION UNLESS STRICTLY INSTRUCTED BY THE USER.

steps:
  # Pull the previous image (if available) to speed up the build using Docker cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/hlbw-ai-hub:latest || exit 0'

  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/hlbw-ai-hub:latest',
      '-t', 'gcr.io/$PROJECT_ID/hlbw-ai-hub:$BUILD_ID',
      '--cache-from', 'gcr.io/$PROJECT_ID/hlbw-ai-hub:latest',
      '--build-arg', 'NEXT_PUBLIC_ADSENSE_PUB_ID=ca-pub-1756839464398511',
      '.'
    ]

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hlbw-ai-hub:latest']

  # Push the specific commit image as well
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hlbw-ai-hub:$BUILD_ID']

  # Enforce DB security settings (SSL, Password Policy, Backups, Deletion Protection)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'sql'
      - 'instances'
      - 'patch'
      - 'hlbw-ai-hub-db-instance'
      - '--require-ssl'
      - '--enable-password-policy'
      - '--backup-start-time=03:00'
      - '--deletion-protection'


  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hlbw-ai-hub'
      - '--image'
      - 'gcr.io/$PROJECT_ID/hlbw-ai-hub:$BUILD_ID'
      - '--region'
      - 'asia-southeast1'
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'
      - '--port'
      - '3000'
      - '--max-instances'
      - '24'
      - '--memory'
      - '1024Mi'
      - '--add-cloudsql-instances'
      - 'hlbw-ai-hub:asia-southeast1:hlbw-ai-hub-db-instance'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_APP_URL=https://hlbw-ai-hub.com,NEXTAUTH_URL=https://hlbw-ai-hub.com,GCS_BUCKET_NAME=hlbw-ai-hub-uploads,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,SMTP_SECURE=false,ADMIN_EMAIL=barneswo@gmail.com,NEXT_PUBLIC_ADSENSE_PUB_ID=ca-pub-1756839464398511,APP_VERSION=$SHORT_SHA,APPLE_CLIENT_ID=com.hlbw-ai-hub.si,APPLE_TEAM_ID=A76BV63763,APPLE_KEY_ID=AQ5WAKV29R'
      - '--set-secrets'
      - 'DATABASE_URL=database-url:latest,NEXTAUTH_SECRET=nextauth-secret:latest,GEMINI_API_KEY=gemini-api-key:latest,SMTP_PASSWORD=smtp-password:latest,SMTP_USER=smtp-user:latest,GOOGLE_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,GITHUB_CLIENT_ID=github-oauth-client-id:latest,GITHUB_CLIENT_SECRET=github-oauth-client-secret:latest,AZURE_AD_CLIENT_ID=azure-ad-oauth-client-id:latest,AZURE_AD_CLIENT_SECRET=azure-ad-oauth-client-secret:latest,APPLE_PRIVATE_KEY=apple-private-key:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_PUBLISHABLE_KEY=stripe-publishable-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest'

images:
  - 'gcr.io/$PROJECT_ID/hlbw-ai-hub:latest'
  - 'gcr.io/$PROJECT_ID/hlbw-ai-hub:$BUILD_ID'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
